# Model Maintenance Configuration

# Performance monitoring thresholds
performance_thresholds:
  accuracy: 0.7
  f1: 0.65
  inference_time: 1.0        # seconds per 1000 samples
  memory_limit_mb: 500

# Model selection rules
selection_rules:
  performance_weight: 0.7
  adaptation_weight: 0.3
  improvement_threshold: 0.01  # Minimum improvement to update best model

# Registry settings
model_registry_path: "./model_registry"

# Monitoring settings
metrics_retention_days: 30
performance_check_interval: 1000  # samples between performance checks

# Adaptive prediction settings
adaptive_prediction:
  enabled: true
  sparse_data_threshold: 0.3      # Ratio of zero values
  anomalous_value_threshold: 0.1  # Ratio of outliers
  feature_complexity_threshold: 0.5  # Complexity score threshold