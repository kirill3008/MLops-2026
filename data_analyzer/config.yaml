dq:
  parsing:
    date_format: "%d-%b-%y"
    date_cols: ["INSR_BEGIN", "INSR_END"]
    time_col: "INSR_BEGIN"

  io:
    analyzed_dir: "../analyzed_data"
    artifacts_dir: "artifacts"
    analyzed_format: "csv"


  thresholds:
    # не для reject, а для "quality flags" в отчёте
    max_missing_total: 0.30
    max_duplicate_ratio: 0.05
    max_bad_date_ratio: 0.01
    max_invalid_ratio: 0.03

  validity:
    allowed_sex: [0, 1, 2]
    allowed_insr_type: [1201, 1202, 1204]
    prod_year_min: 1960
    prod_year_max: 2018
    seats_min: 1
    seats_max: 80
    non_negative_cols: ["INSURED_VALUE", "PREMIUM", "CLAIM_PAID"]

  cleaning:
    drop_duplicates: true
    drop_bad_date_order: true         # INSR_BEGIN > INSR_END -> drop row (как вы сказали)
    drop_missing_time: true
    out_of_range_to_nan: true
    negative_to_nan: true
    impute_numeric: "median"          # median/mean/none
    impute_categorical: "Unknown"     # Unknown/none

  apriori:
    enabled: true
    include_target: false              # можно использовать CLAIM_PAID>0 как item
    top_k_rules: 5
    top_k_cat_values: 5
    min_support: 0.03
    min_confidence: 0.4
    min_lift: 1.05

  rules_reference:
    enabled: true
    path: "artifacts/rules/reference_rules.csv"
    # как строим reference, если его еще нет
    build_if_missing: true

  consistency:
    enabled: true
    report_dir: "artifacts/rules"
    min_antecedent_count: 30
    # rule считается "неустойчивым", если confidence сильно просел:
    min_confidence_abs: 0.30
    confidence_drop_ratio: 0.70   # confidence_new < confidence_ref * 0.70 -> flag
    support_drop_ratio: 0.50      # support_new < support_ref * 0.50 -> flag

